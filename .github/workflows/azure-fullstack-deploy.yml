name: Azure Fullstack Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "nextgen-frontend/**"
      - "nextgen-backend/**"
      - ".github/workflows/azure-fullstack-deploy.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  preflight:
    name: Validate Secrets and Variables
    runs-on: ubuntu-latest
    steps:
      - name: Check required GitHub secrets/variables
        env:
          SWA_TOKEN_PRIMARY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SWA_TOKEN_FALLBACK: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_FIELD_033052100 }}
          WEBAPP_NAME_VAR: ${{ vars.AZURE_WEBAPP_NAME }}
          WEBAPP_NAME_SECRET: ${{ secrets.AZURE_WEBAPP_NAME }}
          WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          missing=0
          if [ -z "$SWA_TOKEN_PRIMARY" ] && [ -z "$SWA_TOKEN_FALLBACK" ]; then
            echo "Missing secret: AZURE_STATIC_WEB_APPS_API_TOKEN (or AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_FIELD_033052100)"
            missing=1
          fi
          if [ -z "$WEBAPP_NAME_VAR" ] && [ -z "$WEBAPP_NAME_SECRET" ]; then
            echo "Missing AZURE_WEBAPP_NAME (set as repo Variable or Secret)"
            missing=1
          fi
          if [ -z "$WEBAPP_PUBLISH_PROFILE" ]; then
            echo "Missing secret: AZURE_WEBAPP_PUBLISH_PROFILE"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  deploy_frontend:
    name: Deploy Frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != '' && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_FIELD_033052100 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "nextgen-frontend"
          api_location: ""
          output_location: ""
          app_build_command: "npm run build"

  deploy_backend:
    name: Deploy Backend (Azure Web App)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: nextgen-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity check Django config
        working-directory: nextgen-backend
        env:
          SECRET_KEY: "ci-secret-key"
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          DATABASE_URL: "sqlite:///db.sqlite3"
          CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
        run: |
          python manage.py check

      - name: Deploy Backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME != '' && vars.AZURE_WEBAPP_NAME || secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./nextgen-backend
